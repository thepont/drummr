name = "Cartoon Brawl"
description = "A hilarious slapstick kit where every hit is a punch, bonk, or yelp. Features the 'Stomach Punch' kick, 'Head Bonk' modal chimes, and various springy, squishy character reactions."

[[sounds]]
name = "Stomach Punch"
engine_type = "fm"
freq = 52.0
mod_ratio = 1.0
mod_index = 3.5
noise_level = 0.2
attack = 2.0
decay = 350.0
attack_shaper = 0.4
sustain_shaper = 0.5 # The "oof" air release

[[sounds]]
name = "Face Slap"
engine_type = "hybrid"
freq = 800.0
noise_color = 0.6
metallic = 0.1
attack = 1.0
decay = 60.0
attack_shaper = 1.0 # Sharp skin contact

