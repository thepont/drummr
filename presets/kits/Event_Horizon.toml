lfo1_division = "TwoBars"
mode_list = [
    { freq = 261.63, q = 150.0, gain = 1.0 },
    { freq = 523.25, q = 100.0, gain = 0.4 },
]
mods = [{ param = "inharmonicity", source = "Lfo1", depth = 0.8 }]

