name = "Event Horizon"
description = "A kit that warps time and gravity. Features 'bouncing ball' acceleration patterns, time-dilated snares that ring for four bars, and generative pre-echo hats that seem to fire before they are hit. Designed to be played slow (60-90 BPM) to let the temporal artifacts breathe."

# Slot 0 — Gravity Kick. Uses a pattern that accelerates (bouncing ball effect).
[[sounds]]
name = "Gravity Kick"
engine_type = "fm"
freq = 48.0
mod_ratio = 1.0
mod_index = 8.0
noise_level = 0.02
attack = 1.0
decay = 300.0
pattern = [
    { division = "Quarter", velocity_factor = 0.6, multiplier = 0.5 },
    { division = "Eighth",   velocity_factor = 0.4, multiplier = 0.75 },
    { division = "Sixteenth", velocity_factor = 0.3, multiplier = 0.85 },
    { division = "ThirtySecond", velocity_factor = 0.2, multiplier = 0.95 },
]

# Slot 1 — Time-Dilated Snare. Rings for 4 bars.
[[sounds]]
name = "Dilated Snare"
engine_type = "phys"
freq = 200.0
attack = 2.0
decay = 1200.0
decay_division = "FourBars"
lfo1_division = "TwoBars"
mods = [{ param = "freq", source = "Lfo1", depth = -40.0 }]

# Slot 2 — Tachyon Hats. Fire 'early' using a negative-ish ghost offset effect.
[[sounds]]
name = "Tachyon Hats"
engine_type = "modal"
freq = 8500.0
brightness = 0.9
dampening = 0.7
inharmonicity = 0.05
attack = 1.0
decay = 45.0
trigger_probability = 0.6
ghost_probability = 0.8
ghost_offset_ms = 15.0
ghost_velocity_factor = 1.2

# Slot 3 — Event OH. Massive ring, bits reduction morph.
[[sounds]]
name = "Event OH"
engine_type = "modal"
freq = 8000.0
brightness = 0.8
dampening = 0.1
inharmonicity = 0.2
attack = 5.0
decay = 2000.0
decay_division = "FourBars"
bits = 16.0
lfo1_division = "Bar"
mods = [{ param = "bits", source = "Lfo1", depth = -12.0 }]

# Slot 4 — Deep Space Tom.
[[sounds]]
name = "Space Tom"
engine_type = "hybrid"
freq = 70.0
noise_color = 0.8
metallic = 0.9
attack = 10.0
decay = 1500.0
decay_division = "TwoBars"

# Slot 5 — Wormhole Perc. Rapidly modulated frequency creates a warping effect.
[[sounds]]
name = "Wormhole Perc"
engine_type = "phys"
freq = 120.0
brightness = 0.4
dampening = 0.3
attack = 2.0
decay = 200.0
lfo1_division = "Eighth"
mods = [{ param = "freq", source = "Lfo1", depth = 300.0 }]

# Slot 6 — Hawking Radiation. High-frequency granular chirps with ghost echos.
[[sounds]]
name = "Hawking Radiation"
engine_type = "granular"
freq = 2000.0
density = 0.2
grain_size = 10.0
jitter = 0.8
attack = 1.0
decay = 150.0
trigger_probability = 0.7
ghost_probability = 0.5
ghost_offset_ms = 30.0
ghost_velocity_factor = 0.6

# Slot 7 — Spaghettification. A tearing, stretching sub-hit sequence.
[[sounds]]
name = "Spaghettification"
engine_type = "hybrid"
freq = 40.0
noise_color = 0.3
metallic = 0.8
attack = 50.0
decay = 800.0
sub_hits = [
    { offset_ms = 10.0, velocity_factor = 0.9 },
    { offset_ms = 25.0, velocity_factor = 0.7 },
    { offset_ms = 45.0, velocity_factor = 0.5 },
]

# Slot 8 — Singularity Bell C. Perfect tuning that warps into dissonance.
[[sounds]]
name = "Singularity C"
engine_type = "modal"
