name = "Stutter Snare"
description = "Footwork / RP Boo / IDM stutter kit. Every voice has dense sub-hits and patterns on top of tempo-locked LFO timbral modulation. The snare uses 4 sub-hits for a flam-into-roll. Claps use 6 taps. Hats are 16th-triplet swarms with shifting grain density. Made to drag a 160 BPM track sideways."

# Slot 0 — Kick with triplet-sub-kicks. Two SixteenthTriplet hits behind
# every primary for footwork-style rolling kicks.
[[sounds]]
name = "Kick (Triplet Stutter)"
engine_type = "fm"
freq = 50.0
mod_ratio = 1.0
mod_index = 6.5
noise_level = 0.03
attack = 1.0
decay = 180.0
pattern = [
    { division = "SixteenthTriplet", velocity_factor = 0.7, multiplier = 1.0 },
    { division = "SixteenthTriplet", velocity_factor = 0.55, multiplier = 2.0 },
    { division = "SixteenthTriplet", velocity_factor = 0.5, multiplier = 3.0 },
]

# Slot 1 — Snare with flam-into-roll. 3 millisecond sub-hits inside 50 ms
# plus a beat-locked decay so the roll resolves cleanly.
[[sounds]]
name = "Snare (Flam-Roll)"
engine_type = "hybrid"
freq = 220.0
noise_color = 0.6
metallic = 0.55
attack = 1.0
decay = 200.0
sub_hits = [
    { offset_ms = 15.0, velocity_factor = 0.7 },
    { offset_ms = 30.0, velocity_factor = 0.55 },
    { offset_ms = 50.0, velocity_factor = 0.45 },
]
decay_division = "Quarter"
ghost_probability = 0.3
ghost_offset_ms = 75.0
ghost_velocity_factor = 0.4

# Slot 2 — Closed hat — 4 sixteenths from each primary plus a triplet
# LFO on grain-style brightness for crosscurrent texture.
[[sounds]]
name = "CH (16th Swarm + Triplet LFO)"
engine_type = "modal"
freq = 7500.0
brightness = 0.85
dampening = 0.5
inharmonicity = 0.12
attack = 1.0
decay = 45.0
pattern = [
    { division = "Sixteenth", velocity_factor = 0.7, multiplier = 1.0 },
    { division = "Sixteenth", velocity_factor = 0.55, multiplier = 2.0 },
    { division = "Sixteenth", velocity_factor = 0.7, multiplier = 3.0 },
]
lfo1_division = "SixteenthTriplet"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.3 }]

# Slot 3 — Open hat — eighth-triplet pattern for footwork shuffle.
[[sounds]]
name = "OH (Triplet Open)"
engine_type = "modal"
freq = 7500.0
brightness = 0.85
dampening = 0.2
inharmonicity = 0.15
attack = 1.0
decay = 180.0
pattern = [
    { division = "EighthTriplet", velocity_factor = 0.55, multiplier = 1.0 },
    { division = "EighthTriplet", velocity_factor = 0.45, multiplier = 2.0 },
]
lfo1_division = "Sixteenth"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.2 }]

# Slot 4 — Tom Low — 1/32 stutter (drum & bass roll feel).
[[sounds]]
name = "Tom Low (1/32 Roll)"
engine_type = "modal"
freq = 110.0
brightness = 0.65
dampening = 0.22
inharmonicity = 0.18
attack = 1.0
decay = 220.0
pattern = [
    { division = "ThirtySecond", velocity_factor = 0.65, multiplier = 1.0 },
    { division = "ThirtySecond", velocity_factor = 0.55, multiplier = 2.0 },
    { division = "ThirtySecond", velocity_factor = 0.5, multiplier = 3.0 },
    { division = "ThirtySecond", velocity_factor = 0.45, multiplier = 4.0 },
]
ghost_probability = 0.25
ghost_offset_ms = 55.0
ghost_velocity_factor = 0.35

# Slot 5 — Tom Mid — drag (sub_hits) plus a 16th-triplet pattern.
[[sounds]]
name = "Tom Mid (Drag-Triplet)"
