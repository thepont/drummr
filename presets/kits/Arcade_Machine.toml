name = "Arcade Machine"
description = "A full 8-bit chiptune kit capturing the sound of a retro arcade cabinet. Features aliased FM zaps, bit-crushed explosions, mechanical button clicks, and iconic 'Coin-In' chimes."

[[sounds]]
name = "Coin-In"
engine_type = "modal"
freq = 1046.5 # C6
brightness = 0.95
dampening = 0.2
inharmonicity = 0.0
attack = 1.0
decay = 400.0
bits = 4.0
pattern = [{ division = "Sixteenth", velocity_factor = 0.8, multiplier = 1.0 }] # Double chime

[[sounds]]
name = "Level Start"
engine_type = "fm"
freq = 440.0
mod_ratio = 1.5
mod_index = 4.0
attack = 1.0
decay = 100.0
bits = 8.0
pattern = [
    { division = "Sixteenth", velocity_factor = 0.9, multiplier = 1.0 },
    { division = "Sixteenth", velocity_factor = 0.8, multiplier = 2.0 },
    { division = "Sixteenth", velocity_factor = 0.7, multiplier = 3.0 }
]

[[sounds]]
name = "Basic Zap"
engine_type = "fm"
freq = 1500.0
mod_ratio = 2.0
mod_index = 15.0
attack = 1.0
decay = 80.0
bits = 6.0
mods = [{ param = "freq", source = "Envelope", depth = -1200.0 }]

