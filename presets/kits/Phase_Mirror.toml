name = "Phase Mirror"
description = "Steve Reich's Piano Phase reimagined as a drum kit. Two identical kicks where slot 1's sub-hit drifts just off the grid (multiplier=1.005) so the two voices slowly slide out of phase across a passage. Snare/hat/tom voices have multi-bar decay_division tails so they ring through the phasing kicks like a halo. Slots 8-15 are a bell choir with explicit mode_list partials plus bar-and-two-bar tempo-locked LFOs slowly shifting their brightness. Designed to be played with a steady quarter-note loop and let the kit do the rest."

# Slot 0 — Reference FM kick. Locked to the grid; slot 1 will drift against it.
[[sounds]]
name = "Kick (Anchor)"
engine_type = "fm"
freq = 55.0
mod_ratio = 1.0
mod_index = 6.0
noise_level = 0.05
attack = 1.0
decay = 220.0

# Slot 1 — The mirror kick. Identical voice, but a sixteenth-note sub-hit
# fires with multiplier=1.005 — almost exactly a 16th later, but ~0.5%
# off. Over many beats the offset accumulates audibly: Reich's phasing,
# but in the time domain of every primary hit.
[[sounds]]
name = "Kick (Mirror Drift)"
engine_type = "fm"
freq = 55.0
mod_ratio = 1.0
mod_index = 6.0
noise_level = 0.05
attack = 1.0
decay = 220.0
pattern = [
    { division = "Sixteenth", velocity_factor = 0.85, multiplier = 1.005 },
    { division = "Eighth",    velocity_factor = 0.55, multiplier = 1.005 },
]
ghost_probability = 0.18
ghost_offset_ms = 70.0
ghost_velocity_factor = 0.35

# Slot 2 — Snare that rings two bars at the live BPM. The long tail
# overlaps the phasing kicks and turns micro-offsets into a slowly
# beating texture.
[[sounds]]
name = "Snare (TwoBars Ring)"
engine_type = "modal"
freq = 240.0
brightness = 0.7
dampening = 0.18
inharmonicity = 0.18
attack = 1.0
decay = 350.0
decay_division = "TwoBars"
mode_list = [
    { freq = 240.0, q = 30.0, gain = 1.0 },
    { freq = 380.0, q = 28.0, gain = 0.7 },
    { freq = 520.0, q = 25.0, gain = 0.45 },
]
ghost_probability = 0.3
ghost_offset_ms = 95.0
ghost_velocity_factor = 0.32

# Slot 3 — Closed hat with Bar-locked decay and a quarter-note LFO
# shimmer on brightness.
[[sounds]]
name = "Hat (Bar Halo)"
engine_type = "modal"
freq = 1760.0
brightness = 0.78
dampening = 0.45
inharmonicity = 0.12
attack = 1.0
decay = 180.0
decay_division = "Bar"
lfo1_division = "Quarter"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.2 }]

