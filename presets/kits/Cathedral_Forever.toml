name = "Cathedral Forever"
description = "Eno / Stars-of-the-Lid drone kit. Every voice rings for bars not milliseconds — decay_division on every slot, mostly Bar / TwoBars / FourBars at the live BPM. Explicit mode_list partials build a tuned bell choir; bar-and-two-bar LFOs sweep brightness so the texture breathes. Strike any one note and the room rings for the next 8 seconds at 120 BPM."

# Slot 0 — Kick that decays over two bars. Very low fundamental so the
# long tail isn't a click; modal so it pitches cleanly.
[[sounds]]
name = "Kick Drone (TwoBars)"
engine_type = "modal"
freq = 45.0
brightness = 0.5
dampening = 0.18
inharmonicity = 0.0
attack = 2.0
decay = 1200.0
decay_division = "TwoBars"
mode_list = [
    { freq = 45.0,  q = 60.0, gain = 1.0 },
    { freq = 90.0,  q = 50.0, gain = 0.55 },
    { freq = 135.0, q = 45.0, gain = 0.3 },
]
lfo1_division = "TwoBars"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.15 }]

# Slot 1 — Snare/bell hybrid. Bar-length decay; modal with explicit
# two-mode list for clean pitch.
[[sounds]]
name = "Snare Bell (Bar)"
engine_type = "modal"
freq = 300.0
brightness = 0.6
dampening = 0.1
inharmonicity = 0.0
attack = 1.0
decay = 800.0
decay_division = "Bar"
mode_list = [
    { freq = 300.0, q = 30.0, gain = 1.0 },
    { freq = 520.0, q = 25.0, gain = 0.7 },
    { freq = 740.0, q = 22.0, gain = 0.4 },
]
lfo1_division = "Bar"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.12 }]

# Slot 2 — Granular shimmer hat with Half-bar decay and bar-long density
# sweep. Smaller-scale brother of the cathedral.
[[sounds]]
name = "Hat Shimmer (Half)"
engine_type = "granular"
freq = 4000.0
density = 0.5
grain_size = 50.0
jitter = 0.4
attack = 4.0
decay = 600.0
decay_division = "Half"
lfo1_division = "Bar"
mods = [{ param = "density", source = "Lfo1", depth = 0.25 }]

