name = "Tension & Release"
description = "Inspired by 'The Fragile' era NIN. More organic, resonant, and atmospheric than Broken Machine. Deep modal kicks, long-decay bell toms, and shifting granular washes. Features complex modulation where brightness and inharmonicity evolve over multiple bars."

# Slot 0 — Deep Resonance Kick. Modal-based for a more organic thud.
[[sounds]]
name = "Deep Modal Kick"
engine_type = "modal"
freq = 45.0
brightness = 0.3
dampening = 0.15
inharmonicity = 0.05
attack = 5.0
decay = 600.0
lfo1_division = "Bar"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.2 }]

# Slot 1 — Resonant Snare. Phys engine for a wooden, acoustic-hybrid feel.
[[sounds]]
name = "Fragile Snare"
engine_type = "phys"
freq = 190.0
attack = 2.0
decay = 350.0
lfo1_division = "TwoBars"
mods = [{ param = "freq", source = "Lfo1", depth = 10.0 }]

