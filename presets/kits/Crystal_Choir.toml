name = "Crystal Choir"
description = "An ethereal, haunting kit blending crystalline glass resonances with fragile vocal-like textures. Uses high-Q modal banks for tuned glass and dense granular clouds for 'choir' atmospheres. Features ghostly echoes and shifting spectral movements."

# Slot 0 — Root Crystal. Deep, resonant glass bowl.
[[sounds]]
name = "Crystal Root"
engine_type = "modal"
freq = 110.0 # A2
brightness = 0.6
dampening = 0.2
inharmonicity = 0.05
attack = 20.0
decay = 1200.0
mode_list = [
    { freq = 110.0,  q = 500.0, gain = 1.0 },
    { freq = 220.5,  q = 400.0, gain = 0.5 },
    { freq = 442.0,  q = 300.0, gain = 0.3 }
]

