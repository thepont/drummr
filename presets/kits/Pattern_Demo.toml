name = "Pattern Demo"
description = "Showcase kit for per-slot rhythm patterns. Every primary hit fires a tempo-locked sub-sequence — snare flams into a triplet stutter, the hat runs four sixteenths off every primary. Drives the entire kit from a single quarter-note MIDI loop and lets the kit author do the rhythm work in TOML."

# Slot 0 — Reference kick. No pattern; sounds identical at any tempo.
[[sounds]]
name = "Kick"
engine_type = "fm"
freq = 55.0
mod_ratio = 1.0
mod_index = 6.0
noise_level = 0.0
attack = 1.0
decay = 250.0

# Slot 1 — Snare with flam + eighth-triplet stutter. Every primary
# fires three more snare hits in a 1/8-triplet pulse at 40% velocity.
# Coupled with a Quarter-locked decay so the stutter blends instead of
# strobing.
[[sounds]]
name = "Snare (Flam+Triplet)"
engine_type = "hybrid"
freq = 200.0
noise_color = 0.6
metallic = 0.5
attack = 1.0
decay = 220.0
pattern = [
    { division = "EighthTriplet", velocity_factor = 0.4, multiplier = 1.0 },
    { division = "EighthTriplet", velocity_factor = 0.4, multiplier = 2.0 },
    { division = "EighthTriplet", velocity_factor = 0.4, multiplier = 3.0 },
]

# Slot 2 — Hat that fires four sixteenths off every primary. One MIDI
# pulse per beat is enough to keep a full 16th-note hat groove running.
[[sounds]]
name = "Hat (4 Sixteenths)"
engine_type = "modal"
freq = 7000.0
brightness = 0.85
dampening = 0.55
inharmonicity = 0.12
attack = 1.0
decay = 60.0
pattern = [
    { division = "Sixteenth", velocity_factor = 0.6, multiplier = 1.0 },
    { division = "Sixteenth", velocity_factor = 0.4, multiplier = 2.0 },
    { division = "Sixteenth", velocity_factor = 0.3, multiplier = 3.0 },
]

# Slot 3 — Clap (multi-tap) showing that millisecond sub_hits coexist
# with beat-locked patterns. Four taps inside ~50 ms, then a single
# quarter-note ghost off the back.
[[sounds]]
name = "Clap+Ghost"
engine_type = "fm"
freq = 1200.0
mod_ratio = 1.0
mod_index = 0.0
noise_level = 1.0
attack = 1.0
decay = 200.0
sub_hits = [
    { offset_ms = 12.0, velocity_factor = 0.85 },
    { offset_ms = 24.0, velocity_factor = 0.70 },
    { offset_ms = 36.0, velocity_factor = 0.55 },
]
pattern = [
    { division = "Quarter", velocity_factor = 0.4, multiplier = 1.0 },
]
