# Slot 13 — Transmission. Filtered noise cloud.
[[sounds]]
name = "Transmission"
engine_type = "granular"
freq = 800.0
density = 0.7
grain_size = 20.0
jitter = 0.5
attack = 50.0
decay = 1000.0
