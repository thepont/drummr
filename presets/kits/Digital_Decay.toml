attack = 1.0
decay = 100.0
trigger_probability = 0.4
ghost_probability = 0.8
ghost_offset_ms = 10.0 # Pre-echo emulation (clamped to positive)

# Slot 15 — The Swarm. Dense granular cloud with velocity-to-jitter mapping.
[[sounds]]
name = "The Swarm"
engine_type = "granular"
freq = 500.0
density = 0.9
grain_size = 40.0
jitter = 0.1
attack = 20.0
decay = 1500.0
