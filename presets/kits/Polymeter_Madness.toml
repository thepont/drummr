name = "Polymeter Madness"
description = "Every slot fires its own time signature. Pattern entries declare a voice's polymetric grid (5/8, 7/8, 11/8, 13/8, 5-against-4) so a single MIDI quarter pulse erupts into a polyrhythmic cathedral. Ghost notes add micro-embellishment; tempo-locked LFOs keep the timbral content drifting at non-aligned bar lengths."

# Slot 0 — Kick — plain quarter pulse derived from the primary itself.
# A single MIDI quarter is enough; the pattern fires three more quarters
# behind it for a full bar of kicks.
[[sounds]]
name = "Kick (Quarter Pulse)"
engine_type = "fm"
freq = 55.0
mod_ratio = 1.0
mod_index = 6.0
noise_level = 0.05
attack = 1.0
decay = 220.0
pattern = [
    { division = "Quarter", velocity_factor = 0.9, multiplier = 1.0 },
    { division = "Quarter", velocity_factor = 0.9, multiplier = 2.0 },
    { division = "Quarter", velocity_factor = 0.9, multiplier = 3.0 },
]

# Slot 1 — Snare — fires on the off-beats (2 & 4) via Quarter*2 and
# Quarter*3. Ghost note adds occasional flam.
[[sounds]]
name = "Snare (Off-beat 2&4)"
engine_type = "hybrid"
freq = 220.0
noise_color = 0.6
metallic = 0.5
attack = 1.0
decay = 200.0
pattern = [
    { division = "Quarter", velocity_factor = 0.85, multiplier = 2.0 },
    { division = "Quarter", velocity_factor = 0.85, multiplier = 4.0 },
]
ghost_probability = 0.25
ghost_offset_ms = 90.0
ghost_velocity_factor = 0.35

# Slot 2 — Closed hat — full 16th-note hat from a single quarter trigger.
[[sounds]]
name = "CH (Sixteenth Grid)"
engine_type = "modal"
freq = 7000.0
brightness = 0.85
dampening = 0.55
inharmonicity = 0.12
attack = 1.0
decay = 55.0
pattern = [
    { division = "Sixteenth", velocity_factor = 0.7, multiplier = 1.0 },
    { division = "Sixteenth", velocity_factor = 0.5, multiplier = 2.0 },
    { division = "Sixteenth", velocity_factor = 0.7, multiplier = 3.0 },
]

# Slot 3 — Open hat — 5-against-4 polyrhythm. Sixteenth * 1.25 gives
