    { division = "Sixteenth", velocity_factor = 0.55, multiplier = 2.5 },
    { division = "Sixteenth", velocity_factor = 0.55, multiplier = 3.75 },
    { division = "Sixteenth", velocity_factor = 0.55, multiplier = 5.0 },
]

