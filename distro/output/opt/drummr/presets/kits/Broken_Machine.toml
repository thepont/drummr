name = "Broken Machine"
description = "Inspired by 'The Downward Spiral' era NIN. Aggressive, distorted FM kicks, mechanical clangs, and high-frequency noise floor. Heavy use of bitcrushing and sample-rate reduction to simulate vintage E-mu Emax/SP-1200 grit."

# Slot 0 — Distorted Sub Kick. Heavy FM modulation index + bitcrush.
[[sounds]]
name = "Sub Kick (Distorted)"
engine_type = "fm"
freq = 52.0
mod_ratio = 1.0
mod_index = 12.0
noise_level = 0.08
attack = 1.0
decay = 400.0
bits = 8.0
rate = 1.0
mods = [{ param = "mod_index", source = "Velocity", depth = 6.0 }]

# Slot 1 — Industrial Snare. Hybrid engine with noise_color sweeping.
[[sounds]]
name = "Industrial Snare"
engine_type = "hybrid"
freq = 180.0
noise_color = 0.5
metallic = 0.8
attack = 1.0
decay = 220.0
bits = 10.0
lfo1_division = "Bar"
mods = [{ param = "noise_color", source = "Lfo1", depth = 0.3 }]

