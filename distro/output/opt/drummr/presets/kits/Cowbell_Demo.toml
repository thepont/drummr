name = "Cowbell Demo"
description = "Hardware-faithful resonator design via explicit mode_list. Demonstrates the 808 cowbell (540 + 800 Hz Schmitt pair), 808 cymbal/hat (six inharmonic squares), 909 synth-hat partials, Tokyo bell-tom DX partials, and gamelan/glass bells, alongside Bessel-mode comparison voices for the same fundamental frequencies."

# --- Slot 0: 808 Cowbell (the canonical 540 + 800 Hz Schmitt-trigger pair). ---
# The Bessel/harmonic interpolation simply can't reproduce this; it would
# always pull the second mode toward 2x or 1.594x the fundamental.
[[sounds]]
name = "808 Cowbell"
engine_type = "modal"
freq = 540.0
brightness = 1.0
dampening = 0.0
inharmonicity = 0.0
attack = 1.0
decay = 350.0
mode_list = [
    {freq = 540.0, q = 60.0, gain = 1.0},
    {freq = 800.0, q = 60.0, gain = 0.9},
]

# --- Slot 1: Bessel cowbell at same fundamental for A/B comparison. ---
[[sounds]]
name = "Bessel Cowbell"
engine_type = "modal"
freq = 540.0
brightness = 0.85
dampening = 0.4
inharmonicity = 0.85
attack = 1.0
decay = 350.0

# --- Slot 2: 808 Cymbal — six inharmonic square-wave-derived partials. ---
# Frequencies are the documented six-oscillator stack of the TR-808 cymbal
# circuit (Schmitt triggers fed through HPF + decay envelope).
[[sounds]]
name = "808 Cymbal"
engine_type = "modal"
freq = 800.0
brightness = 1.0
dampening = 0.0
inharmonicity = 0.0
attack = 1.0
decay = 900.0
mode_list = [
    {freq = 205.0,  q = 30.0, gain = 0.55},
    {freq = 304.0,  q = 35.0, gain = 0.65},
    {freq = 369.0,  q = 35.0, gain = 0.70},
    {freq = 522.0,  q = 40.0, gain = 0.80},
    {freq = 540.0,  q = 40.0, gain = 0.85},
    {freq = 800.0,  q = 50.0, gain = 1.00},
]

