name = "Ghost Maker"
description = "Aphex/Squarepusher-inspired generative kit. Every voice has built-in micro-variation — half of every snare gets a ghost flam, hi-hats randomly drop out, toms spawn their own micro-rolls. Sequence it with a plain 4/4 pulse and the kit invents the syncopation. Combines ghost_probability, trigger_probability, sub_hits, pattern, and tempo-locked LFOs."

# Slot 0 — Kick with dotted-16th sub-hits for swung sub-kicks. Always
# fires; the sub-hits are quieter so they read as ghost-of-kick.
[[sounds]]
name = "Kick (Dotted Subs)"
engine_type = "fm"
freq = 52.0
mod_ratio = 1.0
mod_index = 6.5
noise_level = 0.04
attack = 1.0
decay = 200.0
pattern = [
    { division = "SixteenthDotted", velocity_factor = 0.4, multiplier = 1.0 },
    { division = "SixteenthDotted", velocity_factor = 0.3, multiplier = 2.0 },
]

# Slot 1 — Snare with 50% ghost-flam probability. Half the hits flam
# (90 ms ghost), the other half are clean.
[[sounds]]
name = "Snare (Ghost Flam)"
engine_type = "hybrid"
freq = 220.0
noise_color = 0.6
metallic = 0.5
attack = 1.0
decay = 200.0
ghost_probability = 0.5
ghost_offset_ms = 90.0
ghost_velocity_factor = 0.35

# Slot 2 — Closed hat with triplet-shimmer brightness AND a 30% chance
# of being dropped entirely. Sparse, generative hat.
[[sounds]]
name = "CH (Sparse Triplet)"
engine_type = "modal"
freq = 7500.0
brightness = 0.85
dampening = 0.55
inharmonicity = 0.12
attack = 1.0
decay = 55.0
trigger_probability = 0.7
lfo1_division = "SixteenthTriplet"
mods = [{ param = "brightness", source = "Lfo1", depth = 0.25 }]

# Slot 3 — Open hat with frequent ghost echo (40%) and a bar-length LFO
# on dampening for slow density modulation.
[[sounds]]
name = "OH (Ghost Echo)"
engine_type = "modal"
freq = 7500.0
brightness = 0.82
dampening = 0.2
inharmonicity = 0.15
attack = 1.0
decay = 280.0
ghost_probability = 0.4
ghost_offset_ms = 120.0
ghost_velocity_factor = 0.4
lfo1_division = "Bar"
mods = [{ param = "dampening", source = "Lfo1", depth = 0.15 }]

# Slot 4 — Tom Low. 30% ghost + a triplet sub-roll.
[[sounds]]
name = "Tom Low (Micro-Roll)"
engine_type = "modal"
freq = 110.0
brightness = 0.65
dampening = 0.22
inharmonicity = 0.2
attack = 1.0
decay = 300.0
ghost_probability = 0.3
ghost_offset_ms = 80.0
ghost_velocity_factor = 0.4
pattern = [
    { division = "SixteenthTriplet", velocity_factor = 0.45, multiplier = 1.0 },
    { division = "SixteenthTriplet", velocity_factor = 0.4,  multiplier = 2.0 },
]

